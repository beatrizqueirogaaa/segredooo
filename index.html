<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Sistema</title>
  <style>
    body {
      background: black;
      color: #00ff00;
      font-family: monospace;
      padding: 20px;
      text-align: center;
    }

    #terminal {
      white-space: pre-line;
      text-align: left;
    }

    button {
      background: black;
      color: #00ff00;
      border: 1px solid #00ff00;
      padding: 10px;
      margin: 10px;
      cursor: pointer;
    }

    .glitch {
      font-weight: bold;
      animation: glitch 0.2s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 red; }
      50% { text-shadow: -2px 0 blue; }
      100% { text-shadow: 2px 0 red; }
    }

    @keyframes piscarErro {
      0%   { background: black; }
      50%  { background: #550000; }
      100% { background: black; }
    }

    .erro-final {
      animation: piscarErro 0.05s infinite;
    }
  </style>
</head>
<body>

<div id="terminal"></div>

<button onclick="iniciar()">INICIAR ANÁLISE</button>

<div id="acoes" style="display:none;">
  <button onclick="defender()">TENTAR SE DEFENDER</button>
</div>

<div id="escolha" style="display:none;">
  <button onclick="continuar()">CONTINUAR</button>
  <button onclick="desistir()">DESISTIR</button>
</div>

<script>
const terminal = document.getElementById("terminal");
const escolha = document.getElementById("escolha");
const acoes = document.getElementById("acoes");

const linhas = [
  "Iniciando sistema...",
  "Acessando banco de dados...",
  "Localizando alvo...",
  "✔ Alvo encontrado",
  "Nome: [CONFIDENCIAL]",
  "Status: Sob observação",
  "...",
  "Escaneando energia...",
  "...",
  "ERRO: padrão não catalogado",
  "Origem identificada: filha de Nanã",
  "Nível de perigo: 100%",
  "...",
  "Analisando comportamento...",
  "→ Carinhosa",
  "→ Bonita",
  "→ Inteligente",
  "→ Exigente",
  "→ Sorriso suspeito",
  "→ Sempre tem razão (confirmado)",
  "..."
];

let i = 0;

function escreverLinha() {
  if (i < linhas.length) {
    terminal.innerHTML += linhas[i] + "\n";
    i++;
    setTimeout(escreverLinha, 700);
  } else {
    hackear();
  }
}

function iniciar() {
  terminal.innerHTML = "";
  i = 0;
  escolha.style.display = "none";
  acoes.style.display = "none";
  document.body.classList.remove("erro-final");
  escreverLinha();
}

function hackear() {
  const hack = [
    "...",
    "Detectando interferência externa...",
    "ALERTA: sistema invadido",
    "...",
    "O sistema foi invadido",
    "E o invasor está interessada em você",
    "...",
    "Quebrando criptografia...",
    "...",
    "Identidade revelada:",
    ">> ACESSO: MARIA EDUARDA",
    "...",
    "Status: impossível ignorar",
    "...",
    "Aguardando reação do alvo..."
  ];

  let j = 0;

  function escreverHack() {
    if (j < hack.length) {
      if (hack[j].includes("MARIA EDUARDA")) {
        terminal.innerHTML += '<span class="glitch">' + hack[j] + '</span>\n';
      } else {
        terminal.innerHTML += hack[j] + "\n";
      }

      j++;
      setTimeout(escreverHack, 600);
    } else {
      acoes.style.display = "block";
    }
  }

  escreverHack();
}

// DEFESA
function defender() {
  acoes.style.display = "none";

  const erro = [
    "...",
    "Tentativa de defesa detectada...",
    "Analisando argumento...",
    "...",
    "Processando lógica...",
    "...",
    "ERRO...",
    "ERRO...",
    "ERRO CRÍTICO",
    "Sistema incapaz de processar justificativa",
    "...",
    "Conclusão:",
    "Alvo sempre tem razão"
  ];

  let k = 0;

  function escreverErro() {
    if (k < erro.length) {
      terminal.innerHTML += erro[k] + "\n";
      k++;
      setTimeout(escreverErro, 500);
    } else {
      setTimeout(() => {
        mostrarEscolha();
      }, 500);
    }
  }

  escreverErro();
}

function mostrarEscolha() {
  terminal.innerHTML += "\nVocê deseja continuar com a sapatona tirana?\n";
  escolha.style.display = "block";
}

function continuar() {
  escolha.style.display = "none";
  terminal.innerHTML += "\nProcessando decisão...\n";

  setTimeout(() => {
    terminal.innerHTML += "\nDecisão confirmada\n";
  }, 600);

  setTimeout(() => {
    terminal.innerHTML += "Beijo, abraço e colar de coração 💋🤗💞\n";
  }, 1200);
}

function desistir() {
  escolha.style.display = "none";
  terminal.innerHTML += "\nProcessando decisão...\n";

  setTimeout(() => {
    terminal.innerHTML += "\nERRO...\nERRO...\nERRO CRÍTICO\n";
    document.body.classList.add("erro-final");
  }, 800);
}
</script>

</body>
</html>
